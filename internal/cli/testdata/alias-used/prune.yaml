version: 2

project:
  name: alias-used-test
  language: js-ts

ts_config:
  enabled: true
  baseUrl: src
  paths:
    "@utils/*":
      - utils/*

scan:
  paths:
    - src

entrypoints:
  files:
    - src/index.ts

rules:
  unused_export:
    enabled: true

report:
  format: table
  min_confidence: safe