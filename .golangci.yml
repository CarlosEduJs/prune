version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gocyclo
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain

issues:
  exclude-use-default: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocritic
          - gocyclo