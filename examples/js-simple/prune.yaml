version: 1
project:
  name: js-simple
  language: js-ts
scan:
  paths:
    - "examples/js-simple"
  include:
    - "src/**/*.js"
  exclude:
    - "node_modules/**"
entrypoints:
  files:
    - "src/index.js"
rules:
  unused_function:
    enabled: true
  unused_variable:
    enabled: true
  unused_export:
    enabled: true
  unused_file:
    enabled: false
  dead_feature_flag:
    enabled: true
  suspicious_dynamic_usage:
    enabled: true
feature_flags:
  patterns:
    - "flags\\.[A-Z_]+"
report:
  format: table
  min_confidence: safe
  include_evidence: false
