version: 2
project:
    name: nextjs-test
    language: js-ts
scan:
    paths:
        - .
    include:
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.js'
        - '**/*.jsx'
    exclude:
        - node_modules/**
entrypoints:
    patterns:
        - 'apps/web/src/app/**/page.tsx'
        - 'apps/web/src/app/**/layout.tsx'
rules:
    unused_function:
        enabled: true
    unused_variable:
        enabled: true
    unused_export:
        enabled: true
    unused_file:
        enabled: true
report:
    format: pretty
